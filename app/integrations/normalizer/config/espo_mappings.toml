# app/integrations/normalizer/config/espo_mappings.toml
#
# EspoCRM → UnifiedCRM field value mappings
#
# Rules:
#   - Keys are EspoCRM raw values (lowercase)
#   - Values are your internal standard values
#   - Unknown keys fall back to the [fallbacks] section
#   - Add new mappings here without touching any Python code

# ---------------------------------------------------------------------------
# Status
# EspoCRM Case status values (stored Title Case, matched lowercase)
# ---------------------------------------------------------------------------
[status]
"new"        = "open"
"assigned"   = "open"
"in process" = "pending"
"pending"    = "pending"
"closed"     = "closed"
"rejected"   = "closed"
"duplicate"  = "closed"

# ---------------------------------------------------------------------------
# Priority
# EspoCRM uses plain strings (stored Title Case, matched lowercase)
# ---------------------------------------------------------------------------
[priority]
"low"    = "low"
"normal" = "normal"
"high"   = "high"
"urgent" = "urgent"

# ---------------------------------------------------------------------------
# Fallback values when a raw value is not found in the maps above
# ---------------------------------------------------------------------------
[fallbacks]
status   = "open"
priority = ""       # empty string = NULL in DB

# ---------------------------------------------------------------------------
# Push mappings — internal value → EspoCRM value
# Used when pushing updates FROM the dashboard TO EspoCRM.
# Keys are internal standard values (lowercase).
# Values are the exact EspoCRM strings this instance accepts.
#
# Pick ONE canonical EspoCRM value per internal value.
# Check your EspoCRM admin panel under:
#   Admin → Entity Manager → Case → Fields → Status / Priority
# ---------------------------------------------------------------------------
[push_status]
"open"    = "New"          
"pending" = "In Process"   
"closed"  = "Closed"        
[push_priority]
"low"    = "Low"
"normal" = "Normal"
"high"   = "High"
"urgent" = "Urgent"