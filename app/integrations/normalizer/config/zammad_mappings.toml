# app/integrations/normalizer/config/zammad_mappings.toml
#
# Zammad ↔ UnifiedCRM field value mappings
#
# Rules:
#   - Keys are Zammad raw values (lowercase)
#   - Values are your internal standard values
#   - Unknown keys fall back to the [fallbacks] section
#   - Add new mappings here without touching any Python code

# ---------------------------------------------------------------------------
# Status
# Zammad calls this "state"
# ---------------------------------------------------------------------------
[status]
"new"              = "open"
"open"             = "open"
"pending reminder" = "pending"
"pending close"    = "pending"
"closed"           = "closed"
"merged"           = "closed"
"removed"          = "closed"

# ---------------------------------------------------------------------------
# Priority — string format ("1 low", "2 normal" etc.)
# ---------------------------------------------------------------------------
[priority_name]
"1 low"    = "low"
"2 normal" = "normal"
"3 high"   = "high"
"4 urgent" = "urgent"
"low"      = "low"
"normal"   = "normal"
"high"     = "high"
"urgent"   = "urgent"

# ---------------------------------------------------------------------------
# Priority — integer ID format (returned by list endpoint)
# Keys must be strings in TOML — cast to int in code
# ---------------------------------------------------------------------------
[priority_id]
"1" = "low"
"2" = "normal"
"3" = "high"
"4" = "urgent"

# ---------------------------------------------------------------------------
# Fallback values when a raw value is not found in the maps above
# ---------------------------------------------------------------------------
[fallbacks]
status   = "open"
priority = ""       # empty string = NULL in DB

# ---------------------------------------------------------------------------
# Push mappings — internal value → Zammad value
# Used when pushing updates FROM the dashboard TO Zammad.
# Keys are internal standard values (lowercase).
# Values are the exact Zammad strings this instance accepts.
#
# Status values map to Zammad "state" names.
# Check valid states in Zammad admin under:
#   Admin → Ticket States
#
# Priority values map to Zammad priority display names.
# Check valid priorities in Zammad admin under:
#   Admin → Ticket Priorities
#
# Note: Zammad has no "urgent" priority by default — it maps to "3 high".
# If your instance has a custom "4 urgent" state, update the value below.
# ---------------------------------------------------------------------------
[push_status]
"open"    = "open"
"pending" = "pending reminder"
"closed"  = "closed"

[push_priority]
"low"    = "1 low"
"normal" = "2 normal"
"high"   = "3 high"
"urgent" = "3 high"

# ---------------------------------------------------------------------------
# Pending states — Zammad state names that require a `pending_time` timestamp
# in the PUT payload. Zammad will reject or silently ignore a state change to
# any of these without a valid pending_time.
#
# Add any custom pending state names your instance uses.
# Values must exactly match the strings in [push_status] above.
# ---------------------------------------------------------------------------
[pending_states]
values = ["pending reminder", "pending close"]