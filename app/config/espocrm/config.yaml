auth:
  strategy: "api_token"
  token_header: "X-Api-Key"
  token_prefix: ""

http:
  timeout_seconds: 30
  max_retries: 3
  backoff_base: 2
  retry_on_status: [429, 500, 502, 503, 504]

pagination:
  strategy: "offset"
  page_param: "offset"
  per_page_param: "maxSize"
  default_page_size: 100
  items_path: "list"
  total_count_path: "total"

endpoints:
  tickets:
    path: "/api/v1/Case"
    method: "GET"
    default_params: {}
  ticket_by_id:
    path: "/api/v1/Case/{ticket_id}"
    method: "GET"
    default_params: {}
  agents:
    path: "/api/v1/User"
    method: "GET"
    default_params: {}
  organizations:
    path: "/api/v1/Account"
    method: "GET"
    default_params: {}

field_mappings:
  ticket:
    id: "id"
    title: "name"
    status: "status"
    priority: "priority"
    created_at: "createdAt"
    updated_at: "modifiedAt"
    assignee_id: "assignedUserId"
    customer_id: "contactId"
    organization_id: "accountId"
    description: "?description"
  agent:
    id: "id"
    email: "emailAddress"
    first_name: "firstName"
    last_name: "lastName"
    active: "isActive"
    created_at: "createdAt"
    updated_at: "modifiedAt"
  organization:
    id: "id"
    name: "name"
    active: "?isActive"
    created_at: "createdAt"
    updated_at: "modifiedAt"

status_map:
  "new": "open"
  "assigned": "open"
  "pending": "pending"
  "closed": "closed"
  "rejected": "closed"

priority_map:
  "low": "low"
  "normal": "normal"
  "high": "high"
  "urgent": "urgent"